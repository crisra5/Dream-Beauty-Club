<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dream Beauty Club Admin</title>

    <link rel="stylesheet" href="admin.css">

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>

<body>

<div class="sidebar">

    <h2>Dream Beauty</h2>

    <button id="dashboardBtn" class="menu active">🏠 Dashboard</button>

    <button id="membersBtn" class="menu">👩 Members</button>

    <button id="membershipsBtn" class="menu">💳 Memberships</button>

    <button id="appointmentsBtn" class="menu">📅 Appointments</button>

    <button id="rewardsBtn" class="menu">🎁 Rewards</button>

    <button id="customizeBtn" class="menu">🎨 Customize</button>

    <button id="settingsBtn" class="menu">⚙️ Settings</button>

</div>

<div class="content" id="content">

    <h1>Welcome, Cris 👑</h1>

    <p class="subtitle">
        Dream Beauty Club Administration
    </p>

    <div class="cards">

        <div class="card">
            <h3>Total Members</h3>
            <h2>25</h2>
        </div>

        <div class="card">
            <h3>Active Memberships</h3>
            <h2>22</h2>
        </div>

        <div class="card">
            <h3>Expired</h3>
            <h2>3</h2>
        </div>

        <div class="card">
            <h3>Appointments Today</h3>
            <h2>5</h2>
        </div>

    </div>

</div>

<script src="admin.js"></script>

<script src="dashboard.js"></script>
<script src="members.js"></script>
<script src="memberships.js"></script>
<script src="customize.js"></script>
<script src="settings.js"></script>
<script src="appointments.js"></script>
<script src="rewards.js"></script>

</body>
</html>
