<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dream Beauty Club</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&family=Playfair+Display:wght@600;700&family=Montserrat:wght@300;400;500;600&family=Lora:wght@400;500;600&family=Quicksand:wght@400;500;600&family=Cormorant+Garamond:wght@400;500;600&family=DM+Serif+Display&family=Cinzel:wght@400;600&family=Italianno&family=Pinyon+Script&display=swap" rel="stylesheet">
</head>

<body>

<div class="background">

    <div class="card">

        <img
            id="logo"
            src=""
            style="display:none;max-width:180px;margin:0 auto 20px auto;"
        >

        <h1 id="websiteName">
            Dream Beauty Club
        </h1>

        <p class="subtitle" id="loginSubtitle">
            Welcome to your exclusive beauty membership.
        </p>

        <input
            type="text"
            id="code"
            placeholder="Enter your membership code"
        >

        <button id="enterButton">
            Unlock My Membership ✨
        </button>

        <p id="message"></p>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
