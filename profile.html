<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Complete Your Profile</title>

<link rel="stylesheet" href="profile.css">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;500;600&family=Montserrat:wght@400;600&family=Lora:wght@400;700&family=Quicksand:wght@400;600&family=Cormorant+Garamond:wght@400;700&family=DM+Serif+Display&family=Cinzel:wght@400;700&family=Italianno&family=Pinyon+Script&display=swap" rel="stylesheet">

</head>

<body id="profileBody">

<div class="background">

<div class="profile-card">

<img
id="profileLogo"
class="logo">

<h1 id="profileTitle">
Welcome to Dream Beauty Club
</h1>

<p id="profileSubtitle">
Let's complete your profile.
</p>

<input
id="firstName"
type="text"
placeholder="First Name">

<input
id="lastName"
type="text"
placeholder="Last Name (Optional)">

<button id="saveProfile">

<span id="profileButtonText">
Complete My Profile ✨
</span>

</button>

</div>

</div>

<script src="profile.js"></script>

</body>
</html>
